<!DOCTYPE html>
<html>
<head>
  <title>Manthan Docs</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      display: flex;
    }

    .sidebar {
      width: 250px;
      background: #111;
      color: white;
      padding: 20px;
      height: 100vh;
    }

    .sidebar h3 {
      margin-top: 0;
    }

    .sidebar a {
      display: block;
      margin: 10px 0;
      color: #0f0;
      cursor: pointer;
      text-decoration: none;
    }

    .content {
      flex: 1;
      padding: 30px;
    }

    pre {
      background: #000;
      color: #0f0;
      padding: 15px;
      overflow-x: auto;
    }

    code {
      color: #0f0;
    }
  </style>
</head>

<body>

<div class="sidebar">
  <h3>Manthan Docs</h3>

  <a onclick="loadDoc('01-system-overview.md')">Overview</a>

  <a onclick="loadDoc('02-backend-and-api.md')">API</a>

  <a onclick="loadDoc('FILE_DOCUMENTATION.md')">API Explorer</a>

  <a onclick="loadDoc('03-decision-core-rules-and-audit.md')">Decision</a>

  <a onclick="loadDoc('04-frontend-and-ops.md')">Ops</a>
</div>

<div class="content" id="content">
  Loading...
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<script>
async function loadDoc(file) {
  const res = await fetch("/docs-content/" + file);
  const text = await res.text();
  document.getElementById("content").innerHTML = marked.parse(text);
}

// default page
loadDoc("01-system-overview.md");
</script>

</body>
</html>
