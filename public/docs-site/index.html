<!DOCTYPE html>
<html>
<head>
  <title>Manthan Docs</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Swagger -->
  <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist/swagger-ui.css" />

  <!-- Markdown -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    html, body {
      margin: 0;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #ffffff;
      color: #0f172a;
    }

    body {
      display: flex;
    }

    /* SIDEBAR */
    .sidebar {
      width: 260px;
      background: #f8fafc;
      padding: 20px;
      border-right: 1px solid #e2e8f0;
      overflow-y: auto;

      position: fixed;
      left: 0;
      top: 0;
      height: 100vh;
    }

    .sidebar h3 {
      color: #0f172a;
      margin-bottom: 20px;
    }

    .sidebar a {
      display: block;
      padding: 8px 10px;
      margin: 4px 0;
      color: #475569;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
    }

    .sidebar a:hover {
      background: #e2e8f0;
      color: #0f172a;
    }

    .sidebar a.active {
      background: #2563eb;
      color: #ffffff;
    }

    .sidebar hr {
      border: none;
      border-top: 1px solid #e2e8f0;
      margin: 15px 0;
    }

    /* CONTENT */
    .content {
      margin-left: 260px;
      flex: 1;
      padding: 40px;
      max-width: 900px;
    }

    /* TEXT */
    .content h1, .content h2, .content h3 {
      color: #0f172a;
      margin-top: 24px;
    }

    .content p,
    .content li {
      color: #334155;
      font-size: 16px;
      line-height: 1.7;
    }

    .content strong {
      color: #0f172a;
      font-weight: 600;
    }

    .content hr {
      border: none;
      border-top: 1px solid #e2e8f0;
      margin: 25px 0;
    }

    /* CODE */
    pre {
      background: #020617;
      color: #22c55e;
      padding: 15px;
      border-radius: 8px;
      border: 1px solid #e2e8f0;
      overflow-x: auto;
    }

    code {
      background: #e2e8f0;
      color: #0f172a;
      padding: 2px 6px;
      border-radius: 4px;
    }

    /* CALLOUT */
    .callout {
      background: #f1f5f9;
      color: #0f172a;
      padding: 16px;
      border-left: 5px solid #2563eb;
      border-radius: 8px;
      margin: 20px 0;
      font-weight: 500;
    }

    /* Swagger */
    #swagger {
      background: #ffffff;
      border-radius: 10px;
      padding: 10px;
    }

    /* MOBILE */
    .mobile-header {
      display: none;
      background: #ffffff;
      color: #0f172a;
      padding: 15px;
      justify-content: space-between;
      border-bottom: 1px solid #e2e8f0;
    }

    .menu-btn {
      font-size: 22px;
      cursor: pointer;
    }

    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.3);
    }

    @media (max-width: 768px) {
      body {
        flex-direction: column;
      }

      .mobile-header {
        display: flex;
      }

      .sidebar {
        transform: translateX(-100%);
        transition: 0.3s;
        z-index: 1000;
        background: #ffffff;
      }

      .sidebar.open {
        transform: translateX(0);
      }

      .overlay.show {
        display: block;
      }

      .content {
        margin-left: 0;
        padding: 20px;
      }
    }
  </style>
</head>

<body>

<div class="mobile-header">
  <span>📘 Manthan Docs</span>
  <span class="menu-btn" onclick="toggleSidebar()">☰</span>
</div>

<div class="sidebar" id="sidebar">
  <h3>Manthan Docs</h3>

  <a onclick="loadDoc('01-system-overview.md', this)">Overview</a>
  <a onclick="loadDoc('02-backend-and-api.md', this)">Backend & API</a>
  <a onclick="loadDoc('03-decision-core-rules-and-audit.md', this)">Decision Core</a>
  <a onclick="loadDoc('04-frontend-and-ops.md', this)">Frontend & Ops</a>

  <hr>

  <a onclick="loadDoc('06-end-to-end-flow.md', this)">End-to-End Flow</a>
  <a onclick="loadDoc('07-error-model.md', this)">Error Model</a>
  <a onclick="loadDoc('08-rule-system.md', this)">Rule System</a>
  <a onclick="loadDoc('09-execution-token.md', this)">Execution Token</a>
  <a onclick="loadDoc('10-deployment-ops.md', this)">Deployment</a>
  <a onclick="loadDoc('12-development-guidelines.md', this)">Dev Guidelines</a>

  <hr>

  <a onclick="loadDoc('ARCHITECTURE.md', this)">Architecture</a>
  <a onclick="loadDoc('CONTRACT.md', this)">Contract</a>
  <a onclick="loadDoc('FILE_DOCUMENTATION.md', this)">File Docs</a>
  <a onclick="loadDoc('SECURITY.md', this)">Security</a>
  <a onclick="loadDoc('API.md', this)">API Reference</a>
  <a onclick="loadDoc('README.md', this)">README</a>

  <hr>

  <a onclick="loadSwagger(this)">API Explorer</a>
</div>

<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<div class="content" id="content">Loading...</div>

<script src="https://unpkg.com/swagger-ui-dist/swagger-ui-bundle.js"></script>

<script>
async function loadDoc(file, el) {
  const res = await fetch("/docs-content/" + file);
  const text = await res.text();
  document.getElementById("content").innerHTML = marked.parse(text);
  highlight(el);
  closeSidebar();
}

function loadSwagger(el) {
  document.getElementById("content").innerHTML = '<div id="swagger"></div>';

  SwaggerUIBundle({
    url: "/docs/openapi.yaml",
    dom_id: "#swagger"
  });

  highlight(el);
  closeSidebar();
}

function highlight(el) {
  document.querySelectorAll(".sidebar a").forEach(a => a.classList.remove("active"));
  if (el) el.classList.add("active");
}

function toggleSidebar() {
  document.getElementById("sidebar").classList.toggle("open");
  document.getElementById("overlay").classList.toggle("show");
}

function closeSidebar() {
  document.getElementById("sidebar").classList.remove("open");
  document.getElementById("overlay").classList.remove("show");
}

window.onload = () => {
  const first = document.querySelector(".sidebar a");
  loadDoc("01-system-overview.md", first);
};
</script>

</body>
</html>
