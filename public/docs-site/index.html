<!DOCTYPE html>
<html>
<head>
  <title>Manthan Docs</title>
  <style>
    body { font-family: Arial; margin: 40px; max-width: 900px; }
    h1, h2, h3 { color: #222; }
    pre { background: #111; color: #0f0; padding: 10px; }
    a { color: blue; }
  </style>
</head>
<body>

<h1>Manthan Documentation</h1>

<div id="content">Loading...</div>

<script>
async function loadDoc(file) {
  const res = await fetch("/docs-content/" + file);
  const html = await res.text();
  document.getElementById("content").innerHTML = html;
}

loadDoc("README.md");
</script>

</body>
</html>
