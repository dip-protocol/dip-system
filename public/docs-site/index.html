<!DOCTYPE html>
<html>
<head>
  <title>Manthan Docs</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex;
    }

    .sidebar {
      width: 250px;
      background: #111;
      color: white;
      height: 100vh;
      padding: 20px;
    }

    .sidebar h2 {
      font-size: 18px;
      margin-bottom: 20px;
    }

    .sidebar div {
      margin: 10px 0;
      cursor: pointer;
      color: #ccc;
    }

    .sidebar div:hover {
      color: white;
    }

    .content {
      flex: 1;
      padding: 40px;
      max-width: 100%;
    }

    iframe {
      width: 100%;
      height: 90vh;
      border: none;
    }

    pre {
      background: #111;
      color: #0f0;
      padding: 12px;
    }
  </style>
</head>

<body>

  <div class="sidebar">
    <h2>Manthan Docs</h2>

    <div onclick="navigate('')">Overview</div>
    <div onclick="navigate('api')">API Guide</div>
    <div onclick="navigate('architecture')">Architecture</div>
    <div onclick="navigate('security')">Security</div>

    <hr>

    <div onclick="navigate('explorer')">API Explorer</div>
  </div>

  <div class="content">
    <div id="content">Loading...</div>
  </div>

  <script>
    const routes = {
      "": "README.md",
      "api": "API.md",
      "architecture": "ARCHITECTURE.md",
      "security": "SECURITY.md"
    };

    async function loadDoc(file) {
      const res = await fetch("/docs-content/" + file);
      const html = await res.text();
      document.getElementById("content").innerHTML = html;
    }

    function loadSwagger() {
      document.getElementById("content").innerHTML =
        '<iframe src="/docs"></iframe>';
    }

    function navigate(path) {
      history.pushState({}, "", "/docs-site/" + path);
      handleRoute();
    }

    function handleRoute() {
      const path = window.location.pathname.replace("/docs-site/", "");

      if (path === "explorer") {
        loadSwagger();
        return;
      }

      const file = routes[path] || "README.md";
      loadDoc(file);
    }

    window.onpopstate = handleRoute;

    handleRoute();
  </script>

</body>
</html>
