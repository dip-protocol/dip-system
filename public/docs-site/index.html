<!DOCTYPE html>
<html>
<head>
  <title>Manthan Docs</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      display: flex;
    }

    .sidebar {
      width: 250px;
      background: #111;
      color: white;
      padding: 20px;
      height: 100vh;
    }

    .sidebar h3 {
      margin-top: 0;
    }

    .sidebar a {
      display: block;
      margin: 10px 0;
      color: #0f0;
      cursor: pointer;
      text-decoration: none;
    }

    .sidebar a.active {
      font-weight: bold;
      color: #fff;
    }

    .content {
      flex: 1;
      padding: 30px;
    }

    pre {
      background: #000;
      color: #0f0;
      padding: 15px;
      overflow-x: auto;
    }

    code {
      color: #0f0;
    }
  </style>
</head>

<body>

<div class="sidebar">
  <h3>Manthan Docs</h3>

  <a onclick="loadDoc('01-system-overview.md', event)">Overview</a>

  <a onclick="loadDoc('02-backend-and-api.md', event)">API</a>

  <a onclick="loadDoc('FILE_DOCUMENTATION.md', event)">API Explorer</a>

  <a onclick="loadDoc('03-decision-core-rules-and-audit.md', event)">Decision</a>

  <a onclick="loadDoc('04-frontend-and-ops.md', event)">Ops</a>
</div>

<div class="content" id="content">
  Loading...
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<script>
async function loadDoc(file, event) {
  try {
    const res = await fetch("/docs-content/" + file + "?t=" + Date.now());
    const text = await res.text();

    document.getElementById("content").innerHTML = marked.parse(text);

    // highlight active link
    document.querySelectorAll(".sidebar a").forEach(a => {
      a.classList.remove("active");
    });

    if (event) {
      event.target.classList.add("active");
    }

  } catch (err) {
    document.getElementById("content").innerHTML = "<h2>Error loading document</h2>";
  }
}

// load default page
window.onload = () => {
  const firstLink = document.querySelector(".sidebar a");
  loadDoc("01-system-overview.md");
  if (firstLink) firstLink.classList.add("active");
};
</script>

</body>
</html>
