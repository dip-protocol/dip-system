<!DOCTYPE html>
<html>
<head>
  <title>Manthan Docs</title>
  <style>
    body { font-family: Arial; margin: 0; display: flex; }
    .sidebar { width: 250px; background: #111; color: white; padding: 20px; }
    .content { flex: 1; padding: 20px; }
    a { color: #0f0; display: block; margin: 10px 0; cursor: pointer; }
    pre { background: #000; color: #0f0; padding: 10px; overflow: auto; }
  </style>
</head>
<body>

<div class="sidebar">
  <h3>Manthan Docs</h3>
  <a onclick="loadDoc('01-system-overview.md')">Overview</a>
  <a onclick="loadDoc('02-backend-and-api.md')">API</a>
  <a onclick="loadDoc('03-decision-core-rules-and-audit.md')">Decision</a>
  <a onclick="loadDoc('04-frontend-and-ops.md')">Ops</a>
</div>

<div class="content" id="content">
  Loading...
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<script>
async function loadDoc(file) {
  const res = await fetch("/docs-content/" + file);
  const text = await res.text();
  document.getElementById("content").innerHTML = marked.parse(text);
}

// default load
loadDoc("01-system-overview.md");
</script>

</body>
</html>
