openapi: 3.0.0

info:
  title: Manthan API
  version: "0.2.0"
  description: Decision Infrastructure API for secure, auditable execution

servers:
  - url: https://dip-system.fly.dev

paths:

  /action:
    post:
      summary: Generate execution token
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Success

  /execute:
    post:
      summary: Execute action
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Success

  /audit:
    get:
      summary: Get audit logs
      security:
        - ApiKeyAuth: []
      responses:
        "200":
          description: Success

  /audit/summary:
    get:
      summary: Get audit summary
      security:
        - ApiKeyAuth: []
      responses:
        "200":
          description: Success

  /audit/{requestId}:
    get:
      summary: Get audit by requestId
      security:
        - ApiKeyAuth: []
      parameters:
        - name: requestId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Success

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key