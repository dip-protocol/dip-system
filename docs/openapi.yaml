openapi: 3.0.0

info:
  title: Manthan Decision Infrastructure API
  version: "0.2.0"
  description: Deterministic decision engine with execution tokens and audit traceability

servers:
  - url: https://dip-system.fly.dev

paths:

  /action:
    post:
      summary: Generate execution token
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ActionRequest"
      responses:
        "200":
          description: Execution token generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionResponse"

  /execute:
    post:
      summary: Execute action using execution token
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExecuteRequest"
      responses:
        "200":
          description: Execution result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExecuteResponse"

  /audit:
    get:
      summary: Get audit logs
      security:
        - ApiKeyAuth: []
      responses:
        "200":
          description: Audit logs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditList"

  /audit/summary:
    get:
      summary: Get audit summary
      security:
        - ApiKeyAuth: []
      parameters:
        - name: range
          in: query
          schema:
            type: string
            example: 7d
      responses:
        "200":
          description: Audit summary

  /audit/{requestId}:
    get:
      summary: Get audit by requestId
      security:
        - ApiKeyAuth: []
      parameters:
        - name: requestId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Audit record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditRecord"

components:

  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key

  schemas:

    ActionRequest:
      type: object
      required: [systemId, orgId, action, payload, context]
      properties:
        systemId:
          type: string
          example: billing
        orgId:
          type: string
          example: orgA
        action:
          type: object
          properties:
            type:
              type: string
              example: CREATE_USER
        payload:
          type: object
          properties:
            userId:
              type: string
              example: user-1
        context:
          type: object
          properties:
            actor:
              type: string
              example: admin
            role:
              type: string
              example: ADMIN

    ActionResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        requestId:
          type: string
          example: uuid
        execution_token:
          $ref: "#/components/schemas/ExecutionToken"

    ExecutionToken:
      type: object
      properties:
        action:
          type: object
        payload:
          type: object
        decisionHash:
          type: string
          example: sha256_hash
        auditBinding:
          type: string
          example: binding_hash
        signature:
          type: string
          example: signed_hash

    ExecuteRequest:
      type: object
      required: [action, payload, requestId, decisionHash, auditBinding, signature]
      properties:
        action:
          type: object
        payload:
          type: object
        requestId:
          type: string
        decisionHash:
          type: string
        auditBinding:
          type: string
        signature:
          type: string

    ExecuteResponse:
      type: object
      properties:
        success:
          type: boolean
        requestId:
          type: string
        result:
          type: object
          example:
            message: User created

    AuditRecord:
      type: object
      properties:
        requestId:
          type: string
        decision:
          type: object
        result:
          type: object
        status:
          type: string
          example: SUCCESS
        timestamp:
          type: string
          format: date-time

    AuditList:
      type: object
      properties:
        success:
          type: boolean
        logs:
          type: array
          items:
            $ref: "#/components/schemas/AuditRecord"