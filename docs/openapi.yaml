openapi: 3.0.0
info:
  title: Manthan API
  version: 0.2.0

servers:
  - url: /

paths:

  /action:
    post:
      summary: Generate execution token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - systemId
                - orgId
                - action
                - payload
                - context
              properties:
                systemId:
                  type: string
                orgId:
                  type: string
                action:
                  type: object
                  required:
                    - type
                  properties:
                    type:
                      type: string
                      example: CREATE_USER
                payload:
                  type: object
                  properties:
                    userId:
                      type: string
                context:
                  type: object
                  properties:
                    actor:
                      type: string
                    role:
                      type: string
      responses:
        "200":
          description: Success

  /execute:
    post:
      summary: Execute action
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Execution success

  /audit/{requestId}:
    get:
      summary: Get audit by requestId
      parameters:
        - in: path
          name: requestId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Audit record

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key