# fly.toml app configuration file generated for dip-system on 2026-04-09T18:18:10+05:30
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'dip-system'
primary_region = 'bom'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
